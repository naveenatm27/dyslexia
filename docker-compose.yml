version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5

  pull-model:
    image: curlimages/curl:latest
    container_name: pull-ollama-model
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "echo 'Pulling Llama 3.2 model...' && 
             curl -f -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}' &&
             echo 'Model pulled successfully!'"

  streamlit:
    build: .
    container_name: dyslexia-assistant
    ports:
      - "8501:8501"
    depends_on:
      pull-model:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: unless-stopped

volumes:
  ollama_data:
